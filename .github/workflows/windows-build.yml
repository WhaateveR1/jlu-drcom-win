name: Windows Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build package
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jlu-drcom-win
          path: dist/jlu-drcom-win.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag .\dist\jlu-drcom-win.zip --title $tag --notes-file .\CHANGELOG.md
          } else {
            gh release upload $tag .\dist\jlu-drcom-win.zip --clobber
          }
